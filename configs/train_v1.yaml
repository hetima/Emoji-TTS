model:
  latent_dim: 128
  latent_patch_size: 1
  text_vocab_size: 99574
  text_tokenizer_repo: llm-jp/llm-jp-3-150m
  model_dim: 1280
  num_layers: 12
  num_heads: 20
  mlp_ratio: 2.875
  text_mlp_ratio: 2.6
  speaker_mlp_ratio: 2.6
  text_dim: 512
  text_layers: 10
  text_heads: 8
  speaker_dim: 768
  speaker_layers: 8
  speaker_heads: 12
  speaker_patch_size: 1
  timestep_embed_dim: 512
  adaln_rank: 192

train:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 50件データ / RTX 5060 Ti VRAM 16GB 向け最適設定
  # 推定学習時間: 約30〜60分 (grad_checkpoint使用時)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # ── バッチ・勾配蓄積 ──────────────────────────────────────────
  # 50件 ÷ batch_size=4 = 12step/epoch
  # gradient_accumulation=2 で実効バッチ=8を確保
  batch_size: 4
  gradient_accumulation_steps: 2

  # ── DataLoader ───────────────────────────────────────────────
  num_workers: 4
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 2

  # ── 精度・コンパイル ──────────────────────────────────────────
  allow_tf32: true
  compile_model: false
  precision: bf16

  # ── オプティマイザ ────────────────────────────────────────────
  optimizer: muon
  muon_momentum: 0.95
  learning_rate: 0.0003
  weight_decay: 0.01

  # ── スケジューラ ──────────────────────────────────────────────
  # max_steps=3000に合わせた比率
  # warmup 10%=300step / stable 70%=2100step / decay 20%=600step
  lr_scheduler: wsd
  warmup_steps: 300
  stable_steps: 2100
  min_lr_scale: 0.01

  # ── 学習ステップ ─────────────────────────────────────────────
  # 50件×約60epoch=3000step (約30〜60分)
  max_steps: 3000
  max_text_len: 256

  # ── Conditioning dropout ─────────────────────────────────────
  # 小データ過学習防止のため高めに設定
  text_condition_dropout: 0.15
  speaker_condition_dropout: 0.15
  timestep_stratified: true

  # ── Latent設定 ───────────────────────────────────────────────
  max_latent_steps: 750
  fixed_target_latent_steps: 750
  fixed_target_full_mask: true

  # ── ログ・チェックポイント ────────────────────────────────────
  log_every: 10
  save_every: 100

  # ── W&B ──────────────────────────────────────────────────────
  wandb_enabled: false
  wandb_project:
  wandb_entity:
  wandb_run_name:
  wandb_mode: online

  # ── DDP ──────────────────────────────────────────────────────
  ddp_find_unused_parameters: false

  # ── バリデーション ────────────────────────────────────────────
  # 50件の10%=5件をバリデーション用に確保
  valid_ratio: 0.1
  valid_every: 100

  seed: 0
